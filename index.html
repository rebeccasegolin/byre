<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="lupas.png" type="image/x-icon">
  <title>Byre</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --terra:  #C56A45;
      --rclaro: #F4C9B4;
      --off:    #F7E9DF;
      --bege:   #DCC3B1;
      --marrom: #7A4A2F;
      --choc:   #4D2E1F;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--off);
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
      color: var(--choc);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: .25;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    }

    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 72px 20px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── HERO ── */
    .hero {
      text-align: center;
      margin-bottom: 48px;
    }

    .tagline {
      font-size: .68rem;
      font-weight: 400;
      color: var(--marrom);
      opacity: .62;
      letter-spacing: .06em;
    }

    /* ── NAV ── */
    .nav-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 44px;
    }

    .nav-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #fff;
      border: 1px solid var(--rclaro);
      border-radius: 16px;
      padding: 14px 18px;
      text-decoration: none;
      color: var(--choc);
      transition: border-color .2s, transform .18s;
    }

    .nav-card:hover { border-color: var(--terra); transform: translateY(-2px); }
    .nav-card:active { transform: translateY(0); }

    .nav-icon {
      font-size: 1.35rem;
      width: 42px;
      height: 42px;
      min-width: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--off);
      border-radius: 11px;
    }

    .nav-text { flex: 1; }

    .nav-title {
      font-size: .78rem;
      font-weight: 600;
      color: var(--choc);
      line-height: 1.3;
    }

    .nav-desc {
      font-size: .61rem;
      color: var(--marrom);
      margin-top: 2px;
      opacity: .7;
      line-height: 1.4;
    }

    .nav-arrow {
      font-size: .95rem;
      color: var(--terra);
      opacity: .5;
    }

    /* ── SOCIAL ICONS ── */
    .social-icons {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .icon-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: .78;
      transition: transform .2s, opacity .2s;
      text-decoration: none;
    }

    .icon-btn:hover { transform: scale(1.1); opacity: 1; }

    .icon-btn svg { width: 22px; height: 22px; fill: #fff; }

    .icon-ig {
      background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
    }

    .icon-tt { background: #010101; }
  </style>
</head>
<body>

<div class="page">

  <header class="hero">
    <p class="tagline">que bom ter você por aqui &lt;3</p>
  </header>

  <nav class="nav-list">
    <a href="https://byre.lovable.app/" target="_blank" rel="noopener" class="nav-card">
      <div class="nav-icon">🎁</div>
      <div class="nav-text">
        <div class="nav-title">Grupo de Ofertas</div>
        <div class="nav-desc">as melhores promoções em primeira mão</div>
      </div>
      <span class="nav-arrow">→</span>
    </a>
    <a href="afiliados/" class="nav-card">
      <div class="nav-icon">🛍️</div>
      <div class="nav-text">
        <div class="nav-title">Links de Afiliada</div>
        <div class="nav-desc">compre e me apoie sem gastar nada a mais ♥</div>
      </div>
      <span class="nav-arrow">→</span>
    </a>
  </nav>

  <div class="social-icons">
    <a href="https://www.instagram.com/promos.byre.br/" target="_blank" rel="noopener"
       class="icon-btn icon-ig" aria-label="Instagram @promos.byre.br">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
    </a>
    <a href="https://www.tiktok.com/@promos.byre.br" target="_blank" rel="noopener"
       class="icon-btn icon-tt" aria-label="TikTok @promos.byre.br">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.18 8.18 0 004.78 1.52V6.75a4.85 4.85 0 01-1.01-.06z"/></svg>
    </a>
  </div>

</div>
</body>
</html>
